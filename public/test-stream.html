<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRS 流测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .test-section {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      color: #333;
      border-bottom: 2px solid #1890ff;
      padding-bottom: 10px;
    }
    video {
      width: 100%;
      max-width: 640px;
      background: #000;
      border-radius: 4px;
    }
    .info {
      background: #e6f7ff;
      border: 1px solid #91d5ff;
      padding: 15px;
      border-radius: 4px;
      margin: 10px 0;
    }
    .error {
      background: #fff2e8;
      border: 1px solid #ffbb96;
      padding: 15px;
      border-radius: 4px;
      margin: 10px 0;
      color: #d4380d;
    }
    button {
      background: #1890ff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #40a9ff;
    }
    #log {
      background: #000;
      color: #0f0;
      padding: 15px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>🎥 SRS 流媒体测试工具</h1>

  <div class="test-section">
    <h2>📋 测试信息</h2>
    <div class="info">
      <p><strong>SRS 服务器:</strong> http://101.35.16.42:1985</p>
      <p><strong>应用名称:</strong> live</p>
      <p><strong>流 ID:</strong> stream1</p>
      <p><strong>FLV URL:</strong> http://101.35.16.42:8080/live/stream1.flv</p>
      <p><strong>HLS URL:</strong> http://101.35.16.42:8080/live/stream1.m3u8</p>
    </div>
  </div>

  <div class="test-section">
    <h2>🔍 测试 1: 检查 SRS API</h2>
    <button onclick="testSRSAPI()">测试 SRS API</button>
    <div id="api-result"></div>
  </div>

  <div class="test-section">
    <h2>🎬 测试 2: FLV 直接播放</h2>
    <button onclick="testFLV()">播放 FLV</button>
    <button onclick="stopFLV()">停止</button>
    <div>
      <video id="flv-video" controls muted></video>
    </div>
    <div id="flv-result"></div>
  </div>

  <div class="test-section">
    <h2>📺 测试 3: HLS 直接播放</h2>
    <button onclick="testHLS()">播放 HLS</button>
    <button onclick="stopHLS()">停止</button>
    <div>
      <video id="hls-video" controls muted></video>
    </div>
    <div id="hls-result"></div>
  </div>

  <div class="test-section">
    <h2>📝 日志输出</h2>
    <button onclick="clearLog()">清除日志</button>
    <div id="log"></div>
  </div>

  <script>
    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      const color = type === 'error' ? '#f00' : type === 'success' ? '#0f0' : '#0ff';
      logDiv.innerHTML += `<span style="color: ${color}">[${timestamp}] ${message}</span>\n`;
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(message);
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    async function testSRSAPI() {
      const resultDiv = document.getElementById('api-result');
      resultDiv.innerHTML = '<div class="info">正在测试...</div>';
      log('开始测试 SRS API...');

      try {
        const response = await fetch('http://101.35.16.42:1985/api/v1/streams/');
        const data = await response.json();
        
        log('SRS API 响应成功', 'success');
        log('流列表: ' + JSON.stringify(data, null, 2));
        
        if (data.streams && data.streams.length > 0) {
          resultDiv.innerHTML = `<div class="info">✅ SRS 服务器正常，当前有 ${data.streams.length} 个流在线</div>`;
        } else {
          resultDiv.innerHTML = '<div class="error">⚠️ SRS 服务器正常，但没有流在线。请先推流！</div>';
        }
      } catch (error) {
        log('SRS API 测试失败: ' + error.message, 'error');
        resultDiv.innerHTML = '<div class="error">❌ 无法连接到 SRS 服务器: ' + error.message + '</div>';
      }
    }

    let flvPlayer = null;

    async function testFLV() {
      const video = document.getElementById('flv-video');
      const resultDiv = document.getElementById('flv-result');
      resultDiv.innerHTML = '<div class="info">正在加载 FLV 流...</div>';
      log('开始测试 FLV 播放...');

      try {
        // 使用原生 video 标签测试
        video.src = 'http://101.35.16.42:8080/live/stream1.flv';
        
        video.onloadedmetadata = () => {
          log('FLV 元数据加载成功', 'success');
          resultDiv.innerHTML = '<div class="info">✅ FLV 流加载成功</div>';
        };

        video.onerror = (e) => {
          log('FLV 播放错误: ' + e.message, 'error');
          resultDiv.innerHTML = '<div class="error">❌ FLV 播放失败。可能原因：<br>1. 流不存在（请先推流）<br>2. CORS 问题<br>3. 浏览器不支持 FLV</div>';
        };

        await video.play();
        log('FLV 开始播放', 'success');
      } catch (error) {
        log('FLV 播放失败: ' + error.message, 'error');
        resultDiv.innerHTML = '<div class="error">❌ ' + error.message + '</div>';
      }
    }

    function stopFLV() {
      const video = document.getElementById('flv-video');
      video.pause();
      video.src = '';
      log('FLV 播放已停止');
    }

    async function testHLS() {
      const video = document.getElementById('hls-video');
      const resultDiv = document.getElementById('hls-result');
      resultDiv.innerHTML = '<div class="info">正在加载 HLS 流...</div>';
      log('开始测试 HLS 播放...');

      try {
        video.src = 'http://101.35.16.42:8080/live/stream1.m3u8';
        
        video.onloadedmetadata = () => {
          log('HLS 元数据加载成功', 'success');
          resultDiv.innerHTML = '<div class="info">✅ HLS 流加载成功</div>';
        };

        video.onerror = (e) => {
          log('HLS 播放错误', 'error');
          resultDiv.innerHTML = '<div class="error">❌ HLS 播放失败。可能原因：<br>1. 流不存在（请先推流）<br>2. CORS 问题</div>';
        };

        await video.play();
        log('HLS 开始播放', 'success');
      } catch (error) {
        log('HLS 播放失败: ' + error.message, 'error');
        resultDiv.innerHTML = '<div class="error">❌ ' + error.message + '</div>';
      }
    }

    function stopHLS() {
      const video = document.getElementById('hls-video');
      video.pause();
      video.src = '';
      log('HLS 播放已停止');
    }

    // 页面加载时自动测试 API
    window.onload = () => {
      log('页面加载完成，准备测试');
      testSRSAPI();
    };
  </script>
</body>
</html>
