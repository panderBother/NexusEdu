<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLV 流测试</title>
  <script src="https://cdn.jsdelivr.net/npm/flv.js@latest"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a2e;
      color: #fff;
    }
    h1 {
      color: #00f7ff;
    }
    video {
      width: 100%;
      max-width: 800px;
      background: #000;
      border: 2px solid #00f7ff;
      border-radius: 8px;
    }
    .controls {
      margin: 20px 0;
    }
    button {
      background: #00f7ff;
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
      font-weight: bold;
    }
    button:hover {
      background: #00d4ff;
    }
    .info {
      background: #16213e;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #00f7ff;
    }
    .log {
      background: #000;
      color: #0f0;
      padding: 15px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>🎬 FLV 流直接测试</h1>

  <div class="info">
    <p><strong>测试 URL:</strong> http://101.35.16.42:8080/live/stream1.flv</p>
    <p><strong>说明:</strong> 使用 flv.js 直接播放 FLV 流，不经过 xgplayer</p>
  </div>

  <div class="controls">
    <button onclick="startPlay()">开始播放</button>
    <button onclick="stopPlay()">停止播放</button>
    <button onclick="clearLog()">清除日志</button>
  </div>

  <video id="videoElement" controls muted></video>

  <h2>📝 日志输出</h2>
  <div id="log" class="log"></div>

  <script>
    let flvPlayer = null;
    const videoElement = document.getElementById('videoElement');
    const logDiv = document.getElementById('log');

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const color = type === 'error' ? '#f00' : type === 'success' ? '#0f0' : '#0ff';
      logDiv.innerHTML += `<span style="color: ${color}">[${timestamp}] ${message}</span>\n`;
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(message);
    }

    function clearLog() {
      logDiv.innerHTML = '';
    }

    function startPlay() {
      if (flvPlayer) {
        log('播放器已存在，先停止...', 'info');
        stopPlay();
      }

      log('开始创建 FLV 播放器...', 'info');

      if (flvjs.isSupported()) {
        log('✅ FLV.js 支持当前浏览器', 'success');

        flvPlayer = flvjs.createPlayer({
          type: 'flv',
          url: 'http://101.35.16.42:8080/live/stream1.flv',
          isLive: true,
          hasAudio: true,
          hasVideo: true,
          enableStashBuffer: false,
          stashInitialSize: 128
        }, {
          enableWorker: false,
          enableStashBuffer: false,
          lazyLoad: false,
          lazyLoadMaxDuration: 3 * 60,
          seekType: 'range',
        });

        flvPlayer.attachMediaElement(videoElement);

        // 监听事件
        flvPlayer.on(flvjs.Events.ERROR, (errorType, errorDetail, errorInfo) => {
          log(`❌ 播放器错误: ${errorType}, ${errorDetail}`, 'error');
          console.error('FLV Error:', errorType, errorDetail, errorInfo);
        });

        flvPlayer.on(flvjs.Events.LOADING_COMPLETE, () => {
          log('✅ 加载完成', 'success');
        });

        flvPlayer.on(flvjs.Events.MEDIA_INFO, (mediaInfo) => {
          log(`📊 媒体信息: ${JSON.stringify(mediaInfo)}`, 'info');
        });

        flvPlayer.on(flvjs.Events.STATISTICS_INFO, (stats) => {
          log(`📈 统计信息: 速度=${stats.speed}KB/s, 丢帧=${stats.droppedFrames}`, 'info');
        });

        // Video 元素事件
        videoElement.onloadedmetadata = () => {
          log(`✅ 视频元数据加载: ${videoElement.videoWidth}x${videoElement.videoHeight}`, 'success');
        };

        videoElement.oncanplay = () => {
          log('✅ 视频可以播放', 'success');
        };

        videoElement.onplaying = () => {
          log('✅ 视频正在播放', 'success');
        };

        videoElement.onerror = (e) => {
          log(`❌ Video 元素错误: ${e.message}`, 'error');
        };

        try {
          log('正在加载流...', 'info');
          flvPlayer.load();
          
          log('正在播放...', 'info');
          flvPlayer.play().then(() => {
            log('✅ play() 调用成功', 'success');
          }).catch(e => {
            log(`❌ play() 失败: ${e.message}`, 'error');
          });
        } catch (e) {
          log(`❌ 加载/播放异常: ${e.message}`, 'error');
        }
      } else {
        log('❌ 当前浏览器不支持 FLV.js', 'error');
      }
    }

    function stopPlay() {
      if (flvPlayer) {
        log('停止播放...', 'info');
        try {
          flvPlayer.pause();
          flvPlayer.unload();
          flvPlayer.detachMediaElement();
          flvPlayer.destroy();
          flvPlayer = null;
          log('✅ 播放器已销毁', 'success');
        } catch (e) {
          log(`❌ 停止播放错误: ${e.message}`, 'error');
        }
      }
    }

    // 页面加载完成
    window.onload = () => {
      log('页面加载完成，准备测试', 'info');
      log('点击"开始播放"按钮开始测试', 'info');
    };
  </script>
</body>
</html>
