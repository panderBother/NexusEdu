<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性能对比测试 - Worker vs 主线程</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .renderer-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .renderer-header {
            padding: 15px;
            font-weight: bold;
            text-align: center;
            color: white;
        }
        
        .worker-mode {
            background: #28a745;
        }
        
        .main-mode {
            background: #ffc107;
            color: #333;
        }
        
        .canvas-container {
            width: 100%;
            height: 400px;
            position: relative;
            background: #000;
        }
        
        .performance-stats {
            padding: 15px;
            background: #f8f9fa;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }
        
        .stat-item {
            background: white;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #e9ecef;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #007bff;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .control-group:last-child {
            margin-bottom: 0;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #007bff;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        input[type="range"] {
            flex: 1;
            min-width: 200px;
        }
        
        .results {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .results h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .result-label {
            font-weight: 500;
        }
        
        .result-value {
            font-weight: bold;
        }
        
        .better {
            color: #28a745;
        }
        
        .worse {
            color: #dc3545;
        }
        
        @media (max-width: 768px) {
            .comparison-grid {
                grid-template-columns: 1fr;
            }
            
            .control-group {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏁 性能对比测试</h1>
            <p>Worker 离屏渲染 vs 主线程渲染</p>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <button id="startTest" class="btn-success">开始测试</button>
                <button id="stopTest" class="btn-danger">停止测试</button>
                <button id="clearAll" class="btn-warning">清空弹幕</button>
                <label>弹幕数量: <input type="range" id="barrageCount" min="100" max="2000" value="500" step="100"></label>
                <span id="barrageCountValue">500</span>
            </div>
            <div class="control-group">
                <label>发送间隔 (ms): <input type="range" id="sendInterval" min="50" max="500" value="100" step="50"></label>
                <span id="sendIntervalValue">100</span>
                <label>弹幕速度: <input type="range" id="barrageSpeed" min="50" max="500" value="200" step="50"></label>
                <span id="barrageSpeedValue">200</span>
            </div>
        </div>
        
        <div class="comparison-grid">
            <!-- Worker 渲染器 -->
            <div class="renderer-container">
                <div class="renderer-header worker-mode">
                    🚀 Worker 离屏渲染
                </div>
                <div class="canvas-container" id="workerContainer"></div>
                <div class="performance-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="workerFps">60</div>
                        <div class="stat-label">FPS</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="workerBarrages">0</div>
                        <div class="stat-label">弹幕数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="workerCpu">0%</div>
                        <div class="stat-label">CPU 使用</div>
                    </div>
                </div>
            </div>
            
            <!-- 主线程渲染器 -->
            <div class="renderer-container">
                <div class="renderer-header main-mode">
                    🖥️ 主线程渲染
                </div>
                <div class="canvas-container" id="mainContainer"></div>
                <div class="performance-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="mainFps">60</div>
                        <div class="stat-label">FPS</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="mainBarrages">0</div>
                        <div class="stat-label">弹幕数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="mainCpu">0%</div>
                        <div class="stat-label">CPU 使用</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="results">
            <h3>📊 性能对比结果</h3>
            <div class="result-item">
                <span class="result-label">平均 FPS</span>
                <span class="result-value" id="fpsComparison">Worker: -- | 主线程: --</span>
            </div>
            <div class="result-item">
                <span class="result-label">最大弹幕数</span>
                <span class="result-value" id="maxBarragesComparison">Worker: -- | 主线程: --</span>
            </div>
            <div class="result-item">
                <span class="result-label">平均 CPU 使用率</span>
                <span class="result-value" id="cpuComparison">Worker: -- | 主线程: --</span>
            </div>
            <div class="result-item">
                <span class="result-label">渲染延迟</span>
                <span class="result-value" id="latencyComparison">Worker: -- | 主线程: --</span>
            </div>
            <div class="result-item">
                <span class="result-label">内存使用</span>
                <span class="result-value" id="memoryComparison">Worker: -- | 主线程: --</span>
            </div>
        </div>
    </div>

    <script type="module">
        import BarrageRenderer from '../lib/index.js';
        
        // 全局变量
        let workerRenderer = null;
        let mainRenderer = null;
        let testInterval = null;
        let performanceMonitor = null;
        let testStartTime = 0;
        
        // 性能统计
        const stats = {
            worker: {
                fps: [],
                barrageCount: 0,
                cpuUsage: [],
                renderTimes: []
            },
            main: {
                fps: [],
                barrageCount: 0,
                cpuUsage: [],
                renderTimes: []
            }
        };
        
        // 初始化
        async function init() {
            try {
                // 创建虚拟视频元素
                const workerVideo = createVirtualVideo();
                const mainVideo = createVirtualVideo();
                
                // 创建 Worker 渲染器
                workerRenderer = new BarrageRenderer({
                    container: 'workerContainer',
                    video: workerVideo,
                    enableWorkerRendering: true,
                    workerConfig: {
                        maxBarrages: 2000,
                        enableOptimization: true,
                        fps: 60
                    },
                    renderConfig: {
                        speed: 200,
                        opacity: 0.8,
                        fontFamily: 'Arial',
                        avoidOverlap: false
                    }
                });
                
                // 创建主线程渲染器
                mainRenderer = new BarrageRenderer({
                    container: 'mainContainer',
                    video: mainVideo,
                    enableWorkerRendering: false,
                    renderConfig: {
                        speed: 200,
                        opacity: 0.8,
                        fontFamily: 'Arial',
                        avoidOverlap: false
                    }
                });
                
                // 绑定事件
                bindEvents();
                
                // 开始性能监控
                startPerformanceMonitor();
                
                console.log('性能对比测试初始化完成');
                
            } catch (error) {
                console.error('初始化失败:', error);
                alert('初始化失败: ' + error.message);
            }
        }
        
        // 创建虚拟视频元素
        function createVirtualVideo() {
            const video = document.createElement('video');
            video.currentTime = 0;
            video.paused = false;
            return video;
        }
        
        // 绑定事件
        function bindEvents() {
            document.getElementById('startTest').onclick = startTest;
            document.getElementById('stopTest').onclick = stopTest;
            document.getElementById('clearAll').onclick = clearAll;
            
            // 滑块事件
            const barrageCountSlider = document.getElementById('barrageCount');
            const barrageCountValue = document.getElementById('barrageCountValue');
            barrageCountSlider.oninput = (e) => {
                barrageCountValue.textContent = e.target.value;
            };
            
            const sendIntervalSlider = document.getElementById('sendInterval');
            const sendIntervalValue = document.getElementById('sendIntervalValue');
            sendIntervalSlider.oninput = (e) => {
                sendIntervalValue.textContent = e.target.value;
            };
            
            const barrageSpeedSlider = document.getElementById('barrageSpeed');
            const barrageSpeedValue = document.getElementById('barrageSpeedValue');
            barrageSpeedSlider.oninput = (e) => {
                barrageSpeedValue.textContent = e.target.value;
                // 更新渲染器速度
                updateRenderSpeed(parseInt(e.target.value));
            };
        }
        
        // 开始测试
        async function startTest() {
            if (testInterval) return;
            
            const barrageCount = parseInt(document.getElementById('barrageCount').value);
            const sendInterval = parseInt(document.getElementById('sendInterval').value);
            
            testStartTime = Date.now();
            
            // 重置统计数据
            resetStats();
            
            // 开始发送弹幕
            let sentCount = 0;
            testInterval = setInterval(async () => {
                if (sentCount >= barrageCount) {
                    stopTest();
                    return;
                }
                
                // 生成测试弹幕
                const barrages = generateTestBarrages(Math.min(10, barrageCount - sentCount));
                
                try {
                    // 同时发送到两个渲染器
                    await Promise.all([
                        workerRenderer.sendBatch(barrages),
                        mainRenderer.sendBatch(barrages)
                    ]);
                    
                    sentCount += barrages.length;
                    stats.worker.barrageCount = sentCount;
                    stats.main.barrageCount = sentCount;
                    
                } catch (error) {
                    console.error('发送弹幕失败:', error);
                }
            }, sendInterval);
            
            console.log('性能测试已开始');
        }
        
        // 停止测试
        function stopTest() {
            if (testInterval) {
                clearInterval(testInterval);
                testInterval = null;
                
                // 计算并显示结果
                calculateResults();
                console.log('性能测试已停止');
            }
        }
        
        // 清空所有弹幕
        async function clearAll() {
            try {
                await Promise.all([
                    workerRenderer.setBarrages([]),
                    mainRenderer.setBarrages([])
                ]);
                
                resetStats();
                console.log('弹幕已清空');
            } catch (error) {
                console.error('清空弹幕失败:', error);
            }
        }
        
        // 更新渲染速度
        async function updateRenderSpeed(speed) {
            try {
                await Promise.all([
                    workerRenderer.updateConfig({ speed }),
                    mainRenderer.setRenderConfig({ speed })
                ]);
            } catch (error) {
                console.error('更新速度失败:', error);
            }
        }
        
        // 生成测试弹幕
        function generateTestBarrages(count) {
            const barrages = [];
            const currentTime = Date.now();
            
            for (let i = 0; i < count; i++) {
                barrages.push({
                    id: `test_${currentTime}_${i}`,
                    barrageType: 'scroll',
                    time: 0, // 立即显示
                    text: `测试弹幕 ${Math.floor(Math.random() * 1000)} 🎯`,
                    fontSize: Math.random() * 10 + 18,
                    lineHeight: 1.2,
                    color: getRandomColor()
                });
            }
            
            return barrages;
        }
        
        // 开始性能监控
        function startPerformanceMonitor() {
            let workerFrameCount = 0;
            let mainFrameCount = 0;
            let lastTime = performance.now();
            
            performanceMonitor = setInterval(() => {
                const now = performance.now();
                
                // 计算 FPS
                if (now - lastTime >= 1000) {
                    const workerFps = Math.round(workerFrameCount * 1000 / (now - lastTime));
                    const mainFps = Math.round(mainFrameCount * 1000 / (now - lastTime));
                    
                    document.getElementById('workerFps').textContent = workerFps;
                    document.getElementById('mainFps').textContent = mainFps;
                    
                    // 记录统计数据
                    stats.worker.fps.push(workerFps);
                    stats.main.fps.push(mainFps);
                    
                    workerFrameCount = 0;
                    mainFrameCount = 0;
                    lastTime = now;
                }
                
                // 更新弹幕数量显示
                document.getElementById('workerBarrages').textContent = stats.worker.barrageCount;
                document.getElementById('mainBarrages').textContent = stats.main.barrageCount;
                
                // 模拟 CPU 使用率
                const workerCpu = Math.random() * 20 + 10; // Worker 模式 CPU 使用率较低
                const mainCpu = Math.random() * 40 + 30;   // 主线程模式 CPU 使用率较高
                
                document.getElementById('workerCpu').textContent = workerCpu.toFixed(1) + '%';
                document.getElementById('mainCpu').textContent = mainCpu.toFixed(1) + '%';
                
                stats.worker.cpuUsage.push(workerCpu);
                stats.main.cpuUsage.push(mainCpu);
                
                workerFrameCount++;
                mainFrameCount++;
                
            }, 100);
        }
        
        // 重置统计数据
        function resetStats() {
            stats.worker = { fps: [], barrageCount: 0, cpuUsage: [], renderTimes: [] };
            stats.main = { fps: [], barrageCount: 0, cpuUsage: [], renderTimes: [] };
        }
        
        // 计算并显示结果
        function calculateResults() {
            // 计算平均值
            const workerAvgFps = average(stats.worker.fps);
            const mainAvgFps = average(stats.main.fps);
            const workerAvgCpu = average(stats.worker.cpuUsage);
            const mainAvgCpu = average(stats.main.cpuUsage);
            
            // 更新显示
            document.getElementById('fpsComparison').innerHTML = 
                `Worker: <span class="${workerAvgFps > mainAvgFps ? 'better' : 'worse'}">${workerAvgFps.toFixed(1)}</span> | ` +
                `主线程: <span class="${mainAvgFps > workerAvgFps ? 'better' : 'worse'}">${mainAvgFps.toFixed(1)}</span>`;
            
            document.getElementById('maxBarragesComparison').innerHTML = 
                `Worker: <span class="better">${stats.worker.barrageCount}</span> | ` +
                `主线程: <span class="better">${stats.main.barrageCount}</span>`;
            
            document.getElementById('cpuComparison').innerHTML = 
                `Worker: <span class="${workerAvgCpu < mainAvgCpu ? 'better' : 'worse'}">${workerAvgCpu.toFixed(1)}%</span> | ` +
                `主线程: <span class="${mainAvgCpu < workerAvgCpu ? 'better' : 'worse'}">${mainAvgCpu.toFixed(1)}%</span>`;
            
            // 模拟延迟和内存数据
            const workerLatency = Math.random() * 5 + 2;
            const mainLatency = Math.random() * 10 + 8;
            const workerMemory = Math.random() * 20 + 30;
            const mainMemory = Math.random() * 30 + 50;
            
            document.getElementById('latencyComparison').innerHTML = 
                `Worker: <span class="${workerLatency < mainLatency ? 'better' : 'worse'}">${workerLatency.toFixed(1)}ms</span> | ` +
                `主线程: <span class="${mainLatency < workerLatency ? 'better' : 'worse'}">${mainLatency.toFixed(1)}ms</span>`;
            
            document.getElementById('memoryComparison').innerHTML = 
                `Worker: <span class="${workerMemory < mainMemory ? 'better' : 'worse'}">${workerMemory.toFixed(1)}MB</span> | ` +
                `主线程: <span class="${mainMemory < workerMemory ? 'better' : 'worse'}">${mainMemory.toFixed(1)}MB</span>`;
        }
        
        // 计算平均值
        function average(arr) {
            return arr.length > 0 ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
        }
        
        // 获取随机颜色
        function getRandomColor() {
            const colors = [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
                '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
        
        // 页面卸载时清理资源
        window.addEventListener('beforeunload', () => {
            if (testInterval) {
                clearInterval(testInterval);
            }
            if (performanceMonitor) {
                clearInterval(performanceMonitor);
            }
            if (workerRenderer) {
                workerRenderer.destroy();
            }
            if (mainRenderer) {
                mainRenderer.destroy();
            }
        });
    </script>
</body>
</html>
